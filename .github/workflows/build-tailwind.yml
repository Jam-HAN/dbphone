name: Build Tailwind CSS

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - 'src/tailwind.css'
      - 'tailwind.config.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-tailwind.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tailwind-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS (minified)
        run: npm run build

      - name: Commit rebuilt CSS if changed
        run: |
          if git diff --quiet assets/tailwind.css; then
            echo "✓ No CSS changes — skipping commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/tailwind.css
          git commit -m "chore: rebuild Tailwind CSS [skip ci]"
          git push
